name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to confirm'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-mac:
    name: 🍏 Build Mac & Release
    runs-on: macos-latest
    if: github.event.inputs.confirm == 'release' && github.actor == 'Charlesprakasam'
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          NEW_TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure package.json matches version.txt
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Run Quality Gates
        run: |
          npm run lint
          npm test
          npm run security:audit

      - name: Build macOS DMG
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.tag }} || true
          git push origin ${{ steps.version.outputs.tag }} || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ClipVault ${{ steps.version.outputs.tag }}
          body: |
            ## ClipVault ${{ steps.version.outputs.tag }}

            ### 📦 Downloads
            - **macOS DMG**: Download the `.dmg` file below
            - **Windows EXE**: Download the `.exe` installer below
            - **Windows MSIX**: Download the `.msix` modern app package below (Microsoft Store)

            ### 📋 Changes
            See the commit log for details.
          files: dist/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: 🪟 Build Windows MSIX
    runs-on: windows-latest
    needs: build-mac
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-mac.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync package.json version
        shell: bash
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Build Windows AppX & Convert to MSIX
        shell: bash
        run: |
          npm run dist:win
          for file in dist/*.appx; do
            if [ -f "$file" ]; then
              mv "$file" "${file%.appx}.msix"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach EXE and MSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-mac.outputs.tag }}
          files: |
            dist/*.msix
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
