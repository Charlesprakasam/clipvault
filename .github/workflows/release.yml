name: Release Pipeline

on:
  push:
    branches: [main]
    # Only trigger on actual code changes, not version bump commits
    paths-ignore:
      - '*.md'
      - '.github/workflows/codeql.yml'

permissions:
  contents: write

jobs:
  release:
    name: 🚀 Build & Release
    runs-on: macos-latest
    # Skip if this is a version bump commit (to prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for tag detection
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── Step 1: Determine Next Version ──
      - name: Determine next version
        id: version
        run: |
          # Get the latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Parse version components
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      # ── Step 2: Update package.json Version ──
      - name: Update package.json version
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          echo "Updated package.json to version ${{ steps.version.outputs.version }}"

      # ── Step 3: Run Quality Gates ──
      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm test

      - name: Security Audit
        run: npm run security:audit

      # ── Step 4: Build DMG ──
      - name: Build macOS DMG
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: |
          echo "Build artifacts:"
          ls -la dist/
          echo ""
          echo "DMG files:"
          ls -la dist/*.dmg

      # ── Step 5: Commit Version Bump ──
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      # ── Step 6: Create Tag ──
      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      # ── Step 7: Create GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ClipVault ${{ steps.version.outputs.tag }}
          body: |
            ## ClipVault ${{ steps.version.outputs.tag }}

            ### 📦 Downloads
            - **macOS DMG**: Download the `.dmg` file below

            ### 📋 Changes
            See the [commit log](${{ github.server_url }}/${{ github.repository }}/compare/${{ steps.version.outputs.previous_tag }}...${{ steps.version.outputs.tag }}) for details.

            ---
            *Built with Electron on macOS*
          files: |
            dist/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
