name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to confirm'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: 🚀 Build & Release
    runs-on: macos-latest
    if: github.event.inputs.confirm == 'release' && github.actor == 'Charlesprakasam'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for tag detection
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── Step 1: Read Version from version.txt ──
      - name: Read version
        id: version
        run: |
          # Read version from version.txt
          VERSION=$(cat version.txt | tr -d '[:space:]')
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          NEW_TAG="v${VERSION}"

          echo "Version from file: $VERSION"
          echo "Tag to create: $NEW_TAG"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      # ── Step 2: Ensure package.json matches version.txt ──
      - name: Ensure package.json matches version.txt
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
          echo "Ensured package.json is at version ${{ steps.version.outputs.version }}"

      # ── Step 3: Run Quality Gates ──
      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm test

      - name: Security Audit
        run: npm run security:audit

      # ── Step 4: Build Distributions ──
      - name: Build macOS DMG
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows EXE
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: |
          echo "Build artifacts:"
          ls -la dist/
          echo ""
          echo "DMG files:"
          ls -la dist/*.dmg || echo "No DMG found"
          echo "EXE files:"
          ls -la dist/*.exe || echo "No EXE found"

      # ── Step 5: Commit Version Bump ──
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      # ── Step 6: Create Tag ──
      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      # ── Step 7: Create GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ClipVault ${{ steps.version.outputs.tag }}
          body: |
            ## ClipVault ${{ steps.version.outputs.tag }}

            ### 📦 Downloads
            - **macOS DMG**: Download the `.dmg` file below

            ### 📋 Changes
            See the [commit log](${{ github.server_url }}/${{ github.repository }}/compare/${{ steps.version.outputs.previous_tag }}...${{ steps.version.outputs.tag }}) for details.

            ---
            *Built with Electron on macOS*
          files: |
            dist/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
