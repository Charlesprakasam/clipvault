name: CI — Dev Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Lint
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────
  # Stage 2: Unit Tests
  # ──────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Stage 3: Functional Tests
  # ──────────────────────────────────────────────
  functional-tests:
    name: 🖥️ Functional Tests
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run functional tests
        run: npm run test:functional

  # ──────────────────────────────────────────────
  # Stage 4: Security Scans
  # ──────────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # SAST — Electron-specific security audit
      - name: Electron Security Audit (DAST-equivalent)
        run: npm run security:audit

      # Dependency CVE scan
      - name: npm audit (CVE check)
        run: npm audit --audit-level=high || true
        # `|| true` because we don't want to fail on known electron low/moderate issues

      # OSV-Scanner — Google Open Source Vulnerability database
      - name: Install OSV-Scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: OSV-Scanner (CVE/vulnerability scan)
        run: ./osv-scanner --lockfile=package-lock.json || true

  # ──────────────────────────────────────────────
  # Stage 5: Build Check
  # ──────────────────────────────────────────────
  build-check:
    name: 📦 Build Verification
    runs-on: macos-latest
    needs: [unit-tests, functional-tests, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build DMG (dry-run verification)
        run: npm run dist:mac

      - name: Verify DMG was created
        run: |
          ls -la dist/*.dmg
          echo "✅ Build verification passed"
